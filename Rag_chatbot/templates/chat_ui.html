<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sage</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .bubble.sage p { margin-bottom: 8px; }
    .bubble.sage p:last-child { margin-bottom: 0; }
    .bubble.sage strong { color: var(--sage); font-weight: 500; }
    .bubble.sage ul, .bubble.sage ol {
        padding-left: 20px;
        margin: 8px 0;
    }
    .bubble.sage li { margin-bottom: 4px; }
    .bubble.sage code {
        background: var(--bg);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
    }

    :root {
      --bg:        #0e0f0d;
      --surface:   #151614;
      --border:    #252621;
      --sage:      #a3b899;
      --sage-dim:  #6b7d66;
      --text:      #e8e6e0;
      --text-dim:  #7a7870;
      --user-bg:   #1e2a1c;
      --user-text: #c8dbc4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c5d9bf, #6b8f65);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(163, 184, 153, 0.2);
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sage);
      box-shadow: 0 0 8px var(--sage);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Chat window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome state */
    .welcome {
      margin: auto;
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .welcome-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      font-style: italic;
      color: var(--sage);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 300;
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto;
    }

    .welcome-prompts {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .prompt-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .prompt-chip:hover {
      border-color: var(--sage-dim);
      color: var(--sage);
      background: rgba(163, 184, 153, 0.05);
    }

    /* Messages */
    .message-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      animation: fadeUp 0.4s ease both;
      max-width: 760px;
    }

    .message-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .avatar.sage {
      background: radial-gradient(circle at 35% 35%, #c5d9bf, #6b8f65);
      box-shadow: 0 0 12px rgba(163, 184, 153, 0.15);
    }

    .avatar.user {
      background: var(--user-bg);
      border: 1px solid #2d3d2b;
      font-size: 11px;
      color: var(--sage-dim);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.75;
      max-width: 580px;
    }

    .bubble.sage {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }

    .bubble.user {
      background: var(--user-bg);
      border: 1px solid #2d3d2b;
      color: var(--user-text);
      border-top-right-radius: 4px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 16px 18px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sage-dim);
      animation: bounce 1.2s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    #input-bar {
      position: relative;
      z-index: 10;
      padding: 20px 32px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px 4px 4px 18px;
      transition: border-color 0.2s ease;
    }

    .input-wrap:focus-within {
      border-color: var(--sage-dim);
      box-shadow: 0 0 0 3px rgba(163, 184, 153, 0.06);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.5;
      resize: none;
      height: 24px;
      max-height: 120px;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--sage);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    #send-btn:hover { background: #b8cdb3; transform: scale(1.04); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    #send-btn svg { width: 16px; height: 16px; fill: var(--bg); }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 10px;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <span class="logo-name">Sage</span>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    here for you
  </div>
</header>

<div id="chat-window">
  <div class="welcome" id="welcome">
    <div class="welcome-title">How are you feeling?</div>
    <div class="welcome-sub">A quiet space to talk through whatever's on your mind. No judgment, just presence.</div>
    <div class="welcome-prompts">
      <div class="prompt-chip" onclick="usePrompt(this)">I've been feeling overwhelmed lately</div>
      <div class="prompt-chip" onclick="usePrompt(this)">I'm struggling with anxiety</div>
      <div class="prompt-chip" onclick="usePrompt(this)">I just need someone to talk to</div>
    </div>
  </div>
</div>

<div id="input-bar">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Share what's on your mind..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Sage is an AI — not a replacement for professional help</div>
</div>

  <script src="/chat_ui.js"></script>
</body>
</html>
